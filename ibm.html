<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Phishing Detection System</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
width:90%;
max-width:900px;
padding:40px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:25px;
box-shadow:0 0 40px rgba(0,255,255,0.2);
}

h1{
font-size:3rem;
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
opacity:0.8;
margin-bottom:30px;
}

.input-area{
display:flex;
gap:15px;
}

input{
flex:1;
padding:18px;
border:none;
border-radius:12px;
font-size:16px;
outline:none;
}

button{
padding:18px 30px;
border:none;
border-radius:12px;
background:#00d4ff;
color:black;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.result{
margin-top:30px;
display:none;
}

.card{
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:20px;
}

.status{
font-size:1.5rem;
font-weight:bold;
margin-bottom:15px;
}

.scoreBar{
width:100%;
height:25px;
background:#222;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ff88,#ff0000);
transition:1s;
}

ul{
margin-left:20px;
line-height:1.8;
}

.footer{
margin-top:30px;
text-align:center;
opacity:.7;
}
</style>
</head>

<body>

<div class="container">

<h1>🛡 Smart Phishing Detection System</h1>

<p class="subtitle">
Cybersecurity Project | AI-Based URL Risk Analyzer
</p>

<div class="input-area">
<input id="urlInput" placeholder="Enter website URL">
<button onclick="analyzeURL()">Analyze</button>
</div>

<div class="result" id="result">

<div class="card">

<div class="status" id="status"></div>

<div class="scoreBar">
<div class="fill" id="fill"></div>
</div>

<h3>Risk Score: <span id="score"></span>%</h3>

<br>

<h3>Analysis Report</h3>
<ul id="reasons"></ul>

</div>

</div>

<div class="footer">
Powered by Smart URL Inspection Engine
</div>

</div>

<script>

function analyzeURL(){

let url=document.getElementById("urlInput").value;

let score=0;
let reasons=[];

if(url.includes("@")){
score+=30;
reasons.push("Contains '@' symbol.");
}

if(url.includes("-")){
score+=15;
reasons.push("Contains suspicious hyphen.");
}

if(url.length>50){
score+=20;
reasons.push("Unusually long URL.");
}

if(!url.startsWith("https://")){
score+=35;
reasons.push("HTTPS not detected.");
}

if(url.includes("login")){
score+=10;
reasons.push("Login keyword detected.");
}

if(score>100){
score=100;
}

let status;

if(score<30){
status="✅ SAFE WEBSITE";
}
else if(score<60){
status="⚠ SUSPICIOUS WEBSITE";
}
else{
status="🚨 POTENTIAL PHISHING WEBSITE";
}

document.getElementById("result").style.display="block";
document.getElementById("status").innerHTML=status;
document.getElementById("score").innerHTML=score;
document.getElementById("fill").style.width=score+"%";

let list=document.getElementById("reasons");
list.innerHTML="";

if(reasons.length===0){
list.innerHTML="<li>No major phishing indicators found.</li>";
}
else{
reasons.forEach(item=>{
list.innerHTML+=`<li>${item}</li>`;
});
}

}

</script>

</body>
</html>
